<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA Digital — Affiche</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
}
.affiche {
  width: 800px;
  height: 1000px;
  background: linear-gradient(145deg, #0f0f0f 0%, #1a1610 50%, #0f0f0f 100%);
  border: 1px solid rgba(201,168,76,0.3);
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 60px;
}

/* Glow background */
.affiche::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

/* Corner decorations */
.corner {
  position: absolute;
  width: 40px; height: 40px;
  border-color: rgba(201,168,76,0.4);
  border-style: solid;
}
.corner.tl { top: 24px; left: 24px; border-width: 1px 0 0 1px; }
.corner.tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
.corner.bl { bottom: 24px; left: 24px; border-width: 0 0 1px 1px; }
.corner.br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }

.top-tag {
  position: absolute;
  top: 48px;
  font-size: 9px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.6);
}

.logo-wrap {
  margin-bottom: 40px;
}
.logo-wrap img {
  width: 160px;
  height: 160px;
  object-fit: contain;
  filter: drop-shadow(0 0 20px rgba(201,168,76,0.2));
}

.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 72px;
  font-weight: 900;
  letter-spacing: 4px;
  color: #fff;
  text-align: center;
  line-height: 1;
  margin-bottom: 8px;
}
.brand-name span {
  background: linear-gradient(135deg, #C9A84C, #F5E0A0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.brand-sub {
  font-size: 11px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: rgba(250,250,248,0.35);
  text-align: center;
  margin-bottom: 50px;
}

.divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #C9A84C, transparent);
  margin: 0 auto 50px;
}

.services {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
  max-width: 500px;
  margin-bottom: 50px;
}
.service-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  border: 1px solid rgba(201,168,76,0.12);
  background: rgba(201,168,76,0.03);
}
.service-dot {
  width: 6px; height: 6px;
  background: #C9A84C;
  border-radius: 50%;
  flex-shrink: 0;
}
.service-text {
  font-size: 13px;
  font-weight: 300;
  color: rgba(250,250,248,0.75);
  letter-spacing: 1px;
}
.service-price {
  margin-left: auto;
  font-size: 12px;
  font-weight: 500;
  color: #C9A84C;
  white-space: nowrap;
}

.divider2 {
  width: 100%;
  max-width: 500px;
  height: 1px;
  background: rgba(201,168,76,0.1);
  margin-bottom: 40px;
}

.contact-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.contact-label {
  font-size: 8px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.5);
}
.contact-number {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 3px;
}
.contact-wa {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(250,250,248,0.3);
  text-transform: uppercase;
}

.bottom-tag {
  position: absolute;
  bottom: 48px;
  font-size: 8px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(201,168,76,0.3);
}
</style>
</head>
